<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus</title>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="login-container">

    <div class="login-card">

      <div class="logo-area">

        <img src="assets/logo/logo.png" alt="Nexus" class="logo">

        <h1>NEXUS</h1>

        <p>JRTecnologia</p>

      </div>

      <form>

        <div class="input-group">
          <label>E-mail</label>
          <input type="email" placeholder="Digite seu e-mail">
        </div>

        <div class="input-group">
          <label>Senha</label>
          <input type="password" placeholder="Digite sua senha">
        </div>

        <button type="submit">
          Entrar
        </button>

      </form>

    </div>

  </div>

  <footer>

    <div class="footer-content">

      <h3>Nexus v1.0</h3>

      <p>© JRTecnologia - Soluções Criativas</p>

      <p>Desenvolvido por Jessyca Rocha Tavares</p>

    </div>

  </footer>

  <script src="js/app.js"></script>

</body>
</html>
