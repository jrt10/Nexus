<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Agências - Nexus</title>

        <link rel="stylesheet" href="../css/style.css">

          <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
            <script src="../js/supabase.js"></script>
            </head>
            <body class="sistema-body">

              <aside class="sidebar">
                  <div class="sidebar-logo">
                        <img src="../assets/logo.png" alt="Nexus">
                              <h2>Nexus</h2>
                                  </div>

                                      <nav class="menu">
                                            <a href="dashboard-master.html">🏠 Dashboard</a>
                                                  <a href="agencias.html">🏢 Agências</a>
                                                      </nav>

                                                          <div class="sidebar-footer">
                                                                <div class="linha"></div>

                                                                      <p class="footer-label">Nome</p>
                                                                            <p id="nomeUsuario">Jessyca</p>

                                                                                  <p class="footer-label">Função</p>
                                                                                        <p>Master</p>

                                                                                              <button class="btn-sair" id="btnSair">Sair</button>

                                                                                                    <div class="linha"></div>

                                                                                                          <p>Nexus v1.0</p>
                                                                                                                <p>© JRTecnologia - Soluções Criativas</p>
                                                                                                                      <p>Desenvolvido por Jessyca Rocha Tavares</p>
                                                                                                                          </div>
                                                                                                                            </aside>

                                                                                                                              <main class="conteudo">

                                                                                                                                  <div class="topo">
                                                                                                                                        <div>
                                                                                                                                                <h1>Agências</h1>
                                                                                                                                                        <p>Gerenciamento de agências cadastradas</p>
                                                                                                                                                              </div>

                                                                                                                                                                    <button id="btnNovaAgencia">
                                                                                                                                                                            Nova Agência
                                                                                                                                                                                  </button>
                                                                                                                                                                                      </div>

                                                                                                                                                                                          <div class="atalhos">

                                                                                                                                                                                                <table style="width:100%">
                                                                                                                                                                                                        <thead>
                                                                                                                                                                                                                  <tr>
                                                                                                                                                                                                                              <th>Agência</th>
                                                                                                                                                                                                                                          <th>Responsável</th>
                                                                                                                                                                                                                                                      <th>Email</th>
                                                                                                                                                                                                                                                                  <th>Status</th>
                                                                                                                                                                                                                                                                            </tr>
                                                                                                                                                                                                                                                                                    </thead>

                                                                                                                                                                                                                                                                                            <tbody id="listaAgencias">
                                                                                                                                                                                                                                                                                                      <tr>
                                                                                                                                                                                                                                                                                                                  <td colspan="4">Carregando...</td>
                                                                                                                                                                                                                                                                                                                            </tr>
                                                                                                                                                                                                                                                                                                                                    </tbody>

                                                                                                                                                                                                                                                                                                                                          </table>

                                                                                                                                                                                                                                                                                                                                              </div>

                                                                                                                                                                                                                                                                                                                                                </main>

                                                                                                                                                                                                                                                                                                                                                <script>

                                                                                                                                                                                                                                                                                                                                                const usuario = JSON.parse(localStorage.getItem("nexus_usuario"));

                                                                                                                                                                                                                                                                                                                                                if (!usuario || usuario.tipo !== "master") {
                                                                                                                                                                                                                                                                                                                                                    window.location.href = "../index.html";
                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                    document.getElementById("nomeUsuario").textContent =
                                                                                                                                                                                                                                                                                                                                                        usuario.nome || "Usuário";

                                                                                                                                                                                                                                                                                                                                                        document.getElementById("btnSair").addEventListener("click", () => {

                                                                                                                                                                                                                                                                                                                                                            localStorage.removeItem("nexus_usuario");

                                                                                                                                                                                                                                                                                                                                                                window.location.href = "../index.html";

                                                                                                                                                                                                                                                                                                                                                                });

                                                                                                                                                                                                                                                                                                                                                                async function carregarAgencias() {

                                                                                                                                                                                                                                                                                                                                                                    const { data, error } = await supabaseClient
                                                                                                                                                                                                                                                                                                                                                                            .from("nexus_agencias")
                                                                                                                                                                                                                                                                                                                                                                                    .select("*")
                                                                                                                                                                                                                                                                                                                                                                                            .order("id", { ascending: false });

                                                                                                                                                                                                                                                                                                                                                                                                const tbody =
                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById("listaAgencias");

                                                                                                                                                                                                                                                                                                                                                                                                            tbody.innerHTML = "";

                                                                                                                                                                                                                                                                                                                                                                                                                if (error) {

                                                                                                                                                                                                                                                                                                                                                                                                                        tbody.innerHTML =
                                                                                                                                                                                                                                                                                                                                                                                                                                    "<tr><td colspan='4'>Erro ao carregar.</td></tr>";

                                                                                                                                                                                                                                                                                                                                                                                                                                            return;
                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (!data.length) {

                                                                                                                                                                                                                                                                                                                                                                                                                                                            tbody.innerHTML =
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        "<tr><td colspan='4'>Nenhuma agência cadastrada.</td></tr>";

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                return;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        data.forEach(agencia => {

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                tbody.innerHTML += `
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <tr>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <td>${agencia.nome_agencia || ""}</td>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <td>${agencia.responsavel || ""}</td>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <td>${agencia.email || ""}</td>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <td>${agencia.status || ""}</td>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </tr>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                `;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    carregarAgencias();

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById("btnNovaAgencia")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    .addEventListener("click", () => {

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        alert("Próximo passo: formulário de cadastro.");

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </script>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </html>
