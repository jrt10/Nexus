<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus - Trocar senha</title>
  <link rel="stylesheet" href="../css/style.css?v=txt-completo-1">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js?v=txt-completo-1"></script>
</head>

<body>
  <main class="login-container">
    <section class="login-card">
      <div class="logo-area"><img src="../assets/logo.png" class="logo">
        <h1>NEXUS</h1>
        <p class="marca"><span>JRT</span>ecnologia</p>
      </div>
      <form id="primeiroAcessoForm">
        <div class="input-group"><label>Nova senha</label><input id="novaSenha" type="password"></div>
        <div class="input-group"><label>Confirmar senha</label><input id="confirmarSenha" type="password"></div><label
          class="check-linha"><input type="checkbox" id="termosUso"><span>Aceito os <a href="#"
              onclick="abrirTermo('termos');return false;">Termos de Uso</a></span></label><label
          class="check-linha"><input type="checkbox" id="politicaPrivacidade"><span>Aceito a <a href="#"
              onclick="abrirTermo('privacidade');return false;">Política de Privacidade/LGPD</a></span></label><button
          type="submit" id="btnSalvarSenha">Salvar nova senha</button><button type="button" class="btn-link-login"
          onclick="localStorage.removeItem('nexus_usuario');window.location.href='../index.html'">Voltar ao
          login</button>
      </form>
    </section>
  </main>
  <div class="modal-overlay" id="modalTermo">
    <div class="modal-card">
      <div class="modal-header">
        <div>
          <h2 id="tituloTermo">Termo</h2>
          <p>Leia antes de aceitar.</p>
        </div><button class="btn-fechar" onclick="fecharTermo()">×</button>
      </div>
      <div id="textoTermo" class="box-aviso"></div>
      <div class="modal-actions"><button onclick="fecharTermo()">Fechar</button></div>
    </div>
  </div>
  <script>
    const usuarioLocal = JSON.parse(localStorage.getItem("nexus_usuario")); if (!usuarioLocal || !usuarioLocal.id) { alert("Sessão não encontrada."); window.location.href = "../index.html" }
    function abrirTermo(tipo) { document.getElementById("tituloTermo").textContent = tipo === "termos" ? "Termos de Uso" : "Política de Privacidade/LGPD"; document.getElementById("textoTermo").innerHTML = tipo === "termos" ? "<p>Ao usar o Nexus, o usuário concorda em manter informações verdadeiras, respeitar os processos de eventos, contratos, disponibilidade e comunicação da plataforma.</p>" : "<p>Os dados cadastrados serão utilizados para operação de casting, contato profissional, contratos, eventos, avaliações e gestão de oportunidades, conforme LGPD.</p>"; document.getElementById("modalTermo").classList.add("ativo") } function fecharTermo() { document.getElementById("modalTermo").classList.remove("ativo") }
    document.getElementById("primeiroAcessoForm").addEventListener("submit", async e => { e.preventDefault(); const nova = document.getElementById("novaSenha").value.trim(), conf = document.getElementById("confirmarSenha").value.trim(); if (!nova || !conf) { alert("Preencha as senhas."); return } if (nova.length < 6) { alert("A senha precisa ter pelo menos 6 caracteres."); return } if (nova !== conf) { alert("As senhas não conferem."); return } if (!document.getElementById("termosUso").checked || !document.getElementById("politicaPrivacidade").checked) { alert("Você precisa aceitar os dois termos."); return } const { data, error } = await supabaseClient.from("nexus_usuarios").update({ senha: nova, primeiro_acesso: false, alterar_senha: false }).eq("id", usuarioLocal.id).select().single(); if (error) { alert(error.message); return } await supabaseClient.from("nexus_aceites_termos").insert([{ usuario_id: usuarioLocal.id, termo: "termos_uso_nexus_v1", aceite: true, data_aceite: new Date().toISOString() }, { usuario_id: usuarioLocal.id, termo: "politica_privacidade_lgpd_v1", aceite: true, data_aceite: new Date().toISOString() }]); localStorage.setItem("nexus_usuario", JSON.stringify(data)); alert("Senha alterada com sucesso."); window.location.href = data.tipo === "staff" ? "app-staff.html" : "dashboard-master.html" });
  </script>
</body>

</html>
