<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Nexus - Primeiro Acesso</title>

                <link rel="stylesheet" href="../css/style.css">

                    <style>

                            .primeiro-acesso-card{
                                        width:100%;
                                                    max-width:500px;
                                                                background:#0d0d0d;
                                                                            border:1px solid #222;
                                                                                        border-radius:22px;
                                                                                                    padding:40px;
                                                                                                                box-shadow:0 0 35px rgba(0,0,0,.7);
                                                                                                                        }

                                                                                                                                .titulo{
                                                                                                                                            text-align:center;
                                                                                                                                                        margin-bottom:30px;
                                                                                                                                                                }

                                                                                                                                                                        .titulo h1{
                                                                                                                                                                                    font-size:36px;
                                                                                                                                                                                                margin-bottom:10px;
                                                                                                                                                                                                        }

                                                                                                                                                                                                                .titulo p{
                                                                                                                                                                                                                            color:#999;
                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                            .check-group{
                                                                                                                                                                                                                                                        margin-top:25px;
                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                        .check-item{
                                                                                                                                                                                                                                                                                    display:flex;
                                                                                                                                                                                                                                                                                                align-items:center;
                                                                                                                                                                                                                                                                                                            gap:10px;
                                                                                                                                                                                                                                                                                                                        margin-bottom:12px;
                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                        .check-item a{
                                                                                                                                                                                                                                                                                                                                                    color:#14bdd1;
                                                                                                                                                                                                                                                                                                                                                                text-decoration:none;
                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                .btn-secundario{
                                                                                                                                                                                                                                                                                                                                                                                            width:100%;
                                                                                                                                                                                                                                                                                                                                                                                                        padding:16px;
                                                                                                                                                                                                                                                                                                                                                                                                                    border:none;
                                                                                                                                                                                                                                                                                                                                                                                                                                border-radius:11px;
                                                                                                                                                                                                                                                                                                                                                                                                                                            background:#1f1f1f;
                                                                                                                                                                                                                                                                                                                                                                                                                                                        color:white;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    margin-top:15px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                cursor:pointer;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </style>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </head>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <body>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <main class="login-container">

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <section class="primeiro-acesso-card">

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="titulo">

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <h1>Primeiro Acesso</h1>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                Para continuar, defina uma nova senha.
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </p>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <form>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="input-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <label>Nova Senha</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <input type="password" placeholder="Digite sua nova senha">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="input-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <label>Confirmar Senha</label>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <button type="button">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        Alterar Senha
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </button>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="check-group">

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="check-item">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <input type="checkbox" checked>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                Li e aceito os
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <a href="#">Termos de Uso</a>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="check-item">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <input type="checkbox" checked>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            Li e aceito a
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <a href="#">Política de Privacidade</a>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <button type="button" class="btn-secundario">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                Continuar
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </button>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </form>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </section>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </main>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <footer>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="footer-content">

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <h3>Nexus v1.0</h3>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </footer>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </body>
