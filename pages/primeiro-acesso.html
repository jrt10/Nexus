<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus - Trocar senha</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
</head>
<body>

  <main class="login-container">
    <section class="login-card">

      <div class="logo-area">
        <img src="../assets/logo.png" alt="Logo Nexus" class="logo">
        <h1>NEXUS</h1>
        <p class="marca"><span>JRT</span>ecnologia</p>
      </div>

      <form id="primeiroAcessoForm">
        <div class="input-group">
          <label for="novaSenha">Nova senha</label>
          <input id="novaSenha" type="password" placeholder="Digite sua nova senha">
        </div>

        <div class="input-group">
          <label for="confirmarSenha">Confirmar senha</label>
          <input id="confirmarSenha" type="password" placeholder="Confirme sua nova senha">
        </div>

        <label class="check-linha">
          <input type="checkbox" id="aceiteTermos">
          <span>Li e aceito os termos de uso da plataforma Nexus.</span>
        </label>

        <button type="submit" id="btnSalvarSenha">Salvar nova senha</button>
        <button type="button" class="btn-link-login" id="btnVoltarLogin">Voltar ao login</button>
      </form>

    </section>
  </main>

  <footer>
    <div class="footer-content">
      <h3>Nexus v1.0</h3>
      <p>© JRTecnologia - Soluções Criativas</p>
      <p>Desenvolvido por Jessyca Rocha Tavares</p>
    </div>
  </footer>

<script>
const usuarioLocal = JSON.parse(localStorage.getItem("nexus_usuario"));

if (!usuarioLocal || !usuarioLocal.id) {
  alert("Sessão não encontrada. Faça login novamente.");
  window.location.href = "../index.html";
}

document.getElementById("btnVoltarLogin").addEventListener("click", () => {
  localStorage.removeItem("nexus_usuario");
  window.location.href = "../index.html";
});

document.getElementById("primeiroAcessoForm").addEventListener("submit", async (event) => {
  event.preventDefault();

  const btnSalvar = document.getElementById("btnSalvarSenha");
  const novaSenha = document.getElementById("novaSenha").value.trim();
  const confirmarSenha = document.getElementById("confirmarSenha").value.trim();
  const aceiteTermos = document.getElementById("aceiteTermos").checked;

  if (!novaSenha || !confirmarSenha) {
    alert("Preencha a nova senha e a confirmação.");
    return;
  }

  if (novaSenha.length < 6) {
    alert("A senha precisa ter pelo menos 6 caracteres.");
    return;
  }

  if (novaSenha !== confirmarSenha) {
    alert("As senhas não conferem.");
    return;
  }

  if (!aceiteTermos) {
    alert("Você precisa aceitar os termos para continuar.");
    return;
  }

  btnSalvar.disabled = true;
  btnSalvar.textContent = "Salvando...";

  const { data: usuarioAtualizado, error: erroSenha } = await supabaseClient
    .from("nexus_usuarios")
    .update({
      senha: novaSenha,
      primeiro_acesso: false,
      alterar_senha: false
    })
    .eq("id", usuarioLocal.id)
    .select()
    .single();

  if (erroSenha) {
    btnSalvar.disabled = false;
    btnSalvar.textContent = "Salvar nova senha";
    alert("Erro ao alterar senha: " + erroSenha.message);
    return;
  }

  await supabaseClient
    .from("nexus_aceites_termos")
    .insert({
      usuario_id: usuarioLocal.id,
      termo: "termos_uso_nexus_v1",
      aceite: true,
      data_aceite: new Date().toISOString()
    });

  localStorage.setItem("nexus_usuario", JSON.stringify(usuarioAtualizado));

  alert("Senha alterada com sucesso.");

  if (usuarioAtualizado.tipo === "master" || usuarioAtualizado.tipo === "agencia") {
    window.location.href = "dashboard-master.html";
    return;
  }

  window.location.href = "../index.html";
});
</script>

</body>
</html>
